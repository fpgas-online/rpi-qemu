name: RPi QEMU Boot Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Build QEMU RPi Packages"]
    types: [completed]

jobs:
  boot-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Don't run on workflow_run if the build failed
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU from APT repo (if available)
        id: apt-install
        continue-on-error: true
        run: |
          echo "=== Adding QEMU RPi APT repository ==="
          echo "deb [trusted=yes] https://fpgas-online.github.io/rpi-qemu trixie main" | \
            sudo tee /etc/apt/sources.list.d/qemu-rpi.list
          sudo apt-get update 2>&1 | tail -5

          echo "=== Installing qemu-rpi-system-arm ==="
          sudo apt-get install -y qemu-rpi-system-arm

          echo "=== Installed ==="
          which qemu-rpi-system-aarch64
          qemu-rpi-system-aarch64 --version

      - name: Install build dependencies (QEMU from source fallback)
        if: steps.apt-install.outcome == 'failure'
        run: |
          echo "APT repo not available, building QEMU from source"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-dev libpixman-1-dev libslirp-dev \
            ninja-build meson pkg-config python3 python3-venv

      - name: Cache QEMU build (source fallback)
        if: steps.apt-install.outcome == 'failure'
        id: cache-qemu
        uses: actions/cache@v4
        with:
          path: upstream-qemu
          key: qemu-v11.0.0-rc2-genet-${{ hashFiles('ci/qemu-patches/*.patch') }}

      - name: Build QEMU from source (fallback)
        if: steps.apt-install.outcome == 'failure' && steps.cache-qemu.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v11.0.0-rc2 \
            https://gitlab.com/qemu-project/qemu.git upstream-qemu
          cd upstream-qemu
          for patch in ../ci/qemu-patches/*.patch; do
            git apply "$patch"
          done
          mkdir -p build && cd build
          ../configure --target-list=aarch64-softmmu
          ninja -j$(nproc)

      - name: Set QEMU binary path
        run: |
          if command -v qemu-rpi-system-aarch64 >/dev/null 2>&1; then
            echo "QEMU_BIN=$(which qemu-rpi-system-aarch64)" >> "$GITHUB_ENV"
            echo "Using APT-installed QEMU"
          elif [ -f upstream-qemu/build/qemu-system-aarch64 ]; then
            echo "QEMU_BIN=$PWD/upstream-qemu/build/qemu-system-aarch64" >> "$GITHUB_ENV"
            echo "Using source-built QEMU"
          else
            echo "ERROR: No QEMU binary found!"
            exit 1
          fi

      - name: Install remaining dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu cpio wget

      - name: Cache U-Boot build
        id: cache-uboot
        uses: actions/cache@v4
        with:
          path: test-images/u-boot
          key: uboot-47e064f1-qemu-${{ hashFiles('ci/rpi_4_qemu_defconfig') }}

      - name: Build U-Boot
        if: steps.cache-uboot.outputs.cache-hit != 'true'
        run: |
          mkdir -p test-images
          git clone --depth=100 https://github.com/u-boot/u-boot.git test-images/u-boot
          cd test-images/u-boot
          git checkout 47e064f13171f15817aa1b22b04e309964b15c2c
          cp ../../ci/rpi_4_qemu_defconfig configs/rpi_4_qemu_defconfig
          make rpi_4_qemu_defconfig
          make -j$(nproc) CROSS_COMPILE=aarch64-linux-gnu-

      - name: Ensure U-Boot defconfig is current
        if: steps.cache-uboot.outputs.cache-hit == 'true'
        run: |
          cp ci/rpi_4_qemu_defconfig test-images/u-boot/configs/rpi_4_qemu_defconfig
          cd test-images/u-boot
          make rpi_4_qemu_defconfig
          make -j$(nproc) CROSS_COMPILE=aarch64-linux-gnu-

      - name: Cache RPi kernel
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: |
            test-images/kernel8.img
            test-images/bcm2711-rpi-4-b.dtb
            test-images/tftpboot/Image
            test-images/tftpboot/bcm2711-rpi-4-b.dtb
          key: rpi-kernel-v1

      - name: Download RPi kernel and DTB
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir -p test-images/tftpboot
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/raspberrypi/firmware.git /tmp/rpi-fw
          cd /tmp/rpi-fw
          git sparse-checkout set boot/kernel8.img boot/bcm2711-rpi-4-b.dtb
          cd -
          cp /tmp/rpi-fw/boot/kernel8.img test-images/kernel8.img
          cp /tmp/rpi-fw/boot/bcm2711-rpi-4-b.dtb test-images/bcm2711-rpi-4-b.dtb
          cp test-images/bcm2711-rpi-4-b.dtb test-images/tftpboot/
          gunzip -k -f test-images/kernel8.img
          mv test-images/kernel8 test-images/tftpboot/Image
          rm -rf /tmp/rpi-fw

      - name: Download Alpine and build initramfs
        run: |
          mkdir -p test-images
          wget -q -O test-images/alpine-minirootfs.tar.gz \
            "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/aarch64/alpine-minirootfs-3.21.3-aarch64.tar.gz"
          sudo python3 build-initramfs.py
          mkdir -p test-images/tftpboot
          cp test-images/test-initramfs.cpio.gz test-images/tftpboot/initrd.gz

      - name: Run RPi boot test
        run: |
          echo "=== Running single-instance boot test ==="
          echo "QEMU binary: $QEMU_BIN"
          # Override the QEMU path if using APT-installed version
          QEMU_OVERRIDE=$QEMU_BIN python3 run-rpi-boot-test.py

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-log
          path: tmp/
          retention-days: 7
