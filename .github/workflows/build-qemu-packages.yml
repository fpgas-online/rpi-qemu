name: Build QEMU RPi Packages

on:
  push:
    branches: [main]
    paths:
      - 'ci/qemu-patches/**'
      - 'ci/debian/**'
      - 'ci/build-debs.py'
      - 'ci/vc-boot-pi4b.env'
      - 'ci/rpi_4_qemu_pxeboot_defconfig'
      - '.github/workflows/build-qemu-packages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-qemu-packages
  cancel-in-progress: true

jobs:

  build-debs:
    name: Build Debian packages
    runs-on: ubuntu-latest
    container: debian:trixie
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y git ca-certificates

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get package version
        id: version
        run: |
          apt-get install -y dpkg-dev
          version=$(dpkg-parsechangelog -l ci/debian/changelog -S Version)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Package version: $version"

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            build-essential \
            dpkg-dev devscripts debhelper \
            meson ninja-build pkgconf \
            python3 python3-venv python3-setuptools python3-pip python3-pycotap \
            libglib2.0-dev libpixman-1-dev \
            libslirp-dev libcapstone-dev \
            libfdt-dev zlib1g-dev libzstd-dev \
            wget xz-utils

      - name: Build Debian packages
        run: python3 ci/build-debs.py --output-dir tmp/deb-output

      - name: List built packages
        run: ls -lh tmp/deb-output/

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qemu-rpi-debs
          path: tmp/deb-output/
          retention-days: 90

  build-static:
    name: Build static binary
    runs-on: ubuntu-latest
    container: debian:trixie
    timeout-minutes: 45
    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y git ca-certificates

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            build-essential \
            meson ninja-build pkgconf \
            python3 python3-venv python3-setuptools python3-pip python3-pycotap \
            libglib2.0-dev libpixman-1-dev libslirp-dev \
            libcapstone-dev libfdt-dev zlib1g-dev libzstd-dev \
            libmount-dev \
            wget xz-utils

      - name: Download and patch QEMU
        run: |
          mkdir -p tmp/qemu-static-src
          wget -q -O tmp/qemu-static.tar.xz \
            "https://deb.debian.org/debian/pool/main/q/qemu/qemu_11.0.0~rc2+ds.orig.tar.xz"
          tar xf tmp/qemu-static.tar.xz -C tmp/qemu-static-src --strip-components=1
          rm tmp/qemu-static.tar.xz

          cd tmp/qemu-static-src
          for p in ../../ci/qemu-patches/*.patch; do
            echo "Applying: $(basename $p)"
            git init -q . 2>/dev/null || true
            git apply "$p"
          done

      - name: Build static QEMU
        run: |
          cd tmp/qemu-static-src
          mkdir -p build && cd build
          ../configure \
            --target-list=aarch64-softmmu \
            --static \
            --enable-slirp \
            --disable-docs \
            --disable-gtk \
            --disable-sdl \
            --disable-opengl \
            --disable-virglrenderer \
            --disable-spice \
            --disable-xen \
            --disable-werror \
            --disable-guest-agent \
            --disable-tools \
            --firmwarepath=
          # Build only the system emulator binary -- test binaries fail
          # to link statically because Debian doesn't ship static versions
          # of libmount and libpixman.
          ninja -j$(nproc) qemu-system-aarch64

          echo "=== Static binary ==="
          ls -lh qemu-system-aarch64
          file qemu-system-aarch64
          ldd qemu-system-aarch64 2>&1 || echo "(static - no dynamic deps)"

      - name: Package static binary
        run: |
          mkdir -p tmp/static-output
          cp tmp/qemu-static-src/build/qemu-system-aarch64 \
             tmp/static-output/qemu-rpi-system-aarch64-static
          chmod +x tmp/static-output/qemu-rpi-system-aarch64-static
          tar czf tmp/static-output/qemu-rpi-static-linux-amd64.tar.gz \
            -C tmp/static-output qemu-rpi-system-aarch64-static

      - name: Upload static binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-rpi-static
          path: |
            tmp/static-output/qemu-rpi-static-linux-amd64.tar.gz
          retention-days: 90

  build-pxeboot:
    name: Build PXE boot firmware
    runs-on: ubuntu-latest
    container: debian:trixie
    timeout-minutes: 30
    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y git ca-certificates

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            build-essential gcc-aarch64-linux-gnu \
            make bc bison flex libssl-dev \
            python3 python3-setuptools python3-dev

      - name: Build PXE boot firmware
        run: |
          git clone --depth=100 https://github.com/u-boot/u-boot.git tmp/u-boot-pxeboot
          cd tmp/u-boot-pxeboot
          git checkout 47e064f13171f15817aa1b22b04e309964b15c2c
          cp ../../ci/rpi_4_qemu_pxeboot_defconfig configs/
          cp ../../ci/vc-boot-pi4b.env board/raspberrypi/rpi/pxeboot.env
          make rpi_4_qemu_pxeboot_defconfig
          make -j$(nproc) CROSS_COMPILE=aarch64-linux-gnu-

          echo "=== Firmware built ==="
          ls -lh u-boot.bin

      - name: Package firmware
        run: |
          mkdir -p tmp/pxeboot-output
          cp tmp/u-boot-pxeboot/u-boot.bin tmp/pxeboot-output/rpi4b-pxeboot.bin
          cp tmp/u-boot-pxeboot/arch/arm/dts/bcm2711-rpi-4-b.dtb tmp/pxeboot-output/rpi4b-pxeboot.dtb
          ls -lh tmp/pxeboot-output/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: qemu-rpi-pxeboot
          path: tmp/pxeboot-output/
          retention-days: 90

  publish-apt-repo:
    name: Publish APT repository
    needs: [build-debs, build-static, build-pxeboot]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: qemu-rpi-debs
          path: tmp/debs/

      - name: Download pxeboot firmware
        uses: actions/download-artifact@v4
        with:
          name: qemu-rpi-pxeboot
          path: tmp/pxeboot-firmware/

      - name: Build pxeboot deb
        run: |
          PKG=tmp/pxeboot-pkg
          mkdir -p $PKG/usr/share/qemu-rpi-pxeboot
          cp tmp/pxeboot-firmware/rpi4b-pxeboot.bin $PKG/usr/share/qemu-rpi-pxeboot/
          cp tmp/pxeboot-firmware/rpi4b-pxeboot.dtb $PKG/usr/share/qemu-rpi-pxeboot/

          mkdir -p $PKG/DEBIAN
          cat > $PKG/DEBIAN/control <<'CTRL'
          Package: qemu-rpi-pxeboot
          Version: 0.1
          Architecture: all
          Maintainer: Tim Ansell <mithro@mithis.com>
          Recommends: qemu-rpi-system-arm
          Description: PXE network boot emulation for QEMU Raspberry Pi 4B
           Enables QEMU raspi4b to PXE boot from a standard RPi TFTP layout.
          CTRL
          sed -i 's/^          //' $PKG/DEBIAN/control

          dpkg-deb --build $PKG tmp/debs/qemu-rpi-pxeboot_0.1_all.deb

      - name: List all artifacts
        run: ls -lh tmp/debs/

      - name: Import GPG key
        if: env.APT_GPG_PRIVATE_KEY != ''
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d/ -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
          echo "GPG key imported: $GPG_KEY_ID"

      - name: Build APT repository
        run: |
          REPO_DIR=tmp/apt-repo
          mkdir -p $REPO_DIR/pool/main
          mkdir -p $REPO_DIR/dists/trixie/main/binary-amd64
          mkdir -p $REPO_DIR/dists/trixie/main/source

          # Copy .deb files to pool
          cp tmp/debs/*.deb $REPO_DIR/pool/main/ 2>/dev/null || true

          # Copy source files to pool
          cp tmp/debs/*.dsc $REPO_DIR/pool/main/ 2>/dev/null || true
          cp tmp/debs/*.tar.xz $REPO_DIR/pool/main/ 2>/dev/null || true

          # Generate Packages file
          cd $REPO_DIR
          dpkg-scanpackages --multiversion pool/main > dists/trixie/main/binary-amd64/Packages
          gzip -9c dists/trixie/main/binary-amd64/Packages > dists/trixie/main/binary-amd64/Packages.gz

          # Generate Sources file
          dpkg-scansources pool/main > dists/trixie/main/source/Sources
          gzip -9c dists/trixie/main/source/Sources > dists/trixie/main/source/Sources.gz

          # Generate Release file
          cd dists/trixie
          cat > Release <<EOF
          Origin: fpgas-online
          Label: QEMU RPi
          Suite: trixie
          Codename: trixie
          Architectures: amd64
          Components: main
          Description: QEMU with Raspberry Pi 4B GENET Ethernet support
          Date: $(date -Ru)
          EOF

          # Add checksums
          {
            echo "MD5Sum:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz \
                     main/source/Sources main/source/Sources.gz; do
              [ -f "$f" ] && echo " $(md5sum "$f" | cut -d' ' -f1) $(wc -c < "$f") $f"
            done
            echo "SHA256:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz \
                     main/source/Sources main/source/Sources.gz; do
              [ -f "$f" ] && echo " $(sha256sum "$f" | cut -d' ' -f1) $(wc -c < "$f") $f"
            done
          } >> Release

          # Sign if GPG key is available
          if [ -n "$GPG_KEY_ID" ]; then
            gpg --batch --yes -abs -o Release.gpg Release
            gpg --batch --yes --clearsign -o InRelease Release
            echo "APT repo signed with GPG key $GPG_KEY_ID"
          else
            echo "WARNING: No GPG key - APT repo is unsigned"
            echo "Set APT_GPG_PRIVATE_KEY secret to enable signing"
          fi

          cd ../..

      - name: Create repo index page
        run: |
          cat > tmp/apt-repo/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head><title>QEMU RPi APT Repository</title></head>
          <body>
          <h1>QEMU RPi APT Repository</h1>
          <p>QEMU with Raspberry Pi 4B GENET Ethernet support.</p>
          <h2>Usage</h2>
          <pre>
          # Add the repository
          echo "deb https://fpgas-online.github.io/rpi-qemu trixie main" | \
            sudo tee /etc/apt/sources.list.d/qemu-rpi.list

          # Import the signing key (if signed)
          # curl -fsSL https://fpgas-online.github.io/rpi-qemu/repo-key.gpg | \
          #   sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/qemu-rpi.gpg

          # Install
          sudo apt-get update
          sudo apt-get install qemu-rpi-system-arm
          </pre>
          <h2>Packages</h2>
          <ul>
          <li><b>qemu-rpi-system-arm</b> - QEMU aarch64 emulator with RPi4B GENET</li>
          <li><b>qemu-rpi-system-data</b> - Data files for qemu-rpi</li>
          </ul>
          <p>Source: <a href="https://github.com/fpgas-online/rpi-qemu">github.com/fpgas-online/rpi-qemu</a></p>
          </body>
          </html>
          HTMLEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tmp/apt-repo
          keep_files: false
          force_orphan: true

  create-release:
    name: Create GitHub Release
    needs: [build-debs, build-static, build-pxeboot]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1
          name: "QEMU RPi v11.0.0-rc2+rpi1"
          body: |
            QEMU with Raspberry Pi 4B GENET Ethernet support.

            Based on QEMU v11.0.0-rc2 + 16 patches (Kambalin v6 GENET port).

            **Install via APT:**
            ```
            echo "deb [trusted=yes] https://fpgas-online.github.io/rpi-qemu trixie main" | \
              sudo tee /etc/apt/sources.list.d/qemu-rpi.list
            sudo apt-get update && sudo apt-get install qemu-rpi-system-arm
            ```

            **Or download the static binary** (no dependencies needed).
          files: |
            artifacts/qemu-rpi-debs/*.deb
            artifacts/qemu-rpi-debs/*.dsc
            artifacts/qemu-rpi-static/*.tar.gz
          draft: false
          prerelease: false
          make_latest: true
